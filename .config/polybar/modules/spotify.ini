    content = 
    content-foreground = ${colors.primary}

[module/spotify-music]
    type = custom/script

    exec = playerctl metadata --format "{{ title }} - {{ artist }}"

[module/spotify-prev]
    type = custom/text

    content = 玲
    content-foreground = ${colors.primary}

    click-left = playerctl --player=spotify previous

[module/spotify-play-pause]
