[module/powermenu]
    type = custom/menu

    expand-right = true

    label-open = "  "
    label-open-foreground = ${colors.primary}

    label-close = Cancel
    label-close-foreground = ${colors.primary}
    
    label-separator = " | "
    label-separator-foreground = ${colors.foreground-alt}

    menu-0-0 = Reboot
    menu-0-0-exec = reboot
    menu-0-1 = "Power off  "
    menu-0-1-exec = poweroff
