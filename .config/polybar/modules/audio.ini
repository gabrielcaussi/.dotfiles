[module/audio]
type = internal/pulseaudio

headphone-id = 14

mapped = true

interval = 5

format-volume = <ramp-volume> <label-volume>
    
label-volume = %percentage%%
label-muted = " "
label-muted-foreground = ${colors.foreground-alt}

ramp-volume-0 = "奄"
ramp-volume-1 = "奔"
ramp-volume-2 = "墳"
ramp-volume-3 = " "
ramp-volume-foreground = ${colors.foreground}

