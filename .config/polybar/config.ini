#========< Include modules and other settings >=================================

    include-file = ~/.config/polybar/modules/battery.ini
    include-file = ~/.config/polybar/modules/bspwm.ini
    include-file = ~/.config/polybar/modules/colors.ini
    include-file = ~/.config/polybar/modules/cpu.ini
    include-file = ~/.config/polybar/modules/date.ini
    include-file = ~/.config/polybar/modules/eth.ini
    include-file = ~/.config/polybar/modules/filesystem.ini
    include-file = ~/.config/polybar/modules/memory.ini
    include-file = ~/.config/polybar/modules/menu.ini
    include-file = ~/.config/polybar/modules/powermenu.ini
    include-file = ~/.config/polybar/modules/pulseaudio.ini
    include-file = ~/.config/polybar/modules/spotify.ini
    include-file = ~/.config/polybar/modules/title.ini
    include-file = ~/.config/polybar/modules/wlan.ini
    include-file = ~/.config/polybar/modules/xkeyboard.ini

#========< Polybar - Top Position >=============================================

[bar/top]
    font-0 ="Ubuntu Nerd Font:pixelsize=10,0"
    background = ${colors.background}
    foreground = ${colors.foreground}
    module-margin-right = 5
    module-margin-left = 0
    height = 20
    line-size = 3
    modules-left = menu title
    modules-center = 
    modules-right = xkeyboard wlan eth filesystem cpu memory pulseaudio battery date powermenu
    cursor-click = pointer
    cursor-scroll = ns-resize

#=======< Polybar - Bottom Position >===========================================

[bar/bottom]
    font-0 ="Ubuntu Nerd Font:pixelsize=10,0"
    background = ${colors.background}
    foreground = ${colors.foreground}
    module-margin-right = 5
    height = 20
    bottom = true
    line-size = 3
    modules-left = bspwm
    modules-center = spotify-icon spotify-music spotify-prev spotify-play-pause spotify-next spotify-time
    modules-right = 
    cursor-click = pointer
    cursor-scroll = ns-resize
    tray-background = ${colors.indicator}
    tray-position = right
    tray-padding = 10
    enable-ipc = true

#========< Other settings >=====================================================

[settings]
    screenchange-reload = true
    compositing-background = xor
    pseudo-transparency = true

[global/wm]
    margin-top = 0
    margin-bottom = 0
